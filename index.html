<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Photo Framer Studio</title>
    <!-- JSZip handles packaging files right inside the browser framework -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f3f4f6; margin: 0; padding: 40px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; max-width: 450px; }
        h2 { margin: 0 0 8px 0; color: #1f2937; text-align: center; }
        .subtitle { font-size: 14px; color: #6b7280; text-align: center; margin-bottom: 25px; }
        .group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #4b5563; }
        input[type="file"] { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; background: #fafafa; }
        button { width: 100%; padding: 14px; background-color: #2563eb; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #1d4ed8; }
        button:disabled { background-color: #9ca3af; cursor: not-allowed; }
        
        /* Progress Bar UI Layout */
        .progress-container { margin-top: 20px; display: none; }
        .progress-bar-bg { width: 100%; background-color: #e5e7eb; height: 12px; border-radius: 6px; overflow: hidden; margin-bottom: 6px; }
        .progress-bar-fill { width: 0%; background-color: #2563eb; height: 100%; transition: width 0.1s ease; }
        .status-text { font-size: 14px; text-align: center; color: #4b5563; font-weight: 500; }

        /* Notification & Download Link Card UI */
        .notification-box { display: none; background-color: #f0fdf4; border: 1px solid #bbf7d0; padding: 20px; border-radius: 8px; margin-top: 25px; text-align: center; }
        .notification-title { color: #166534; font-weight: bold; font-size: 16px; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .notification-message { color: #1f2937; font-size: 14px; margin-bottom: 15px; }
        .download-link { display: inline-block; padding: 10px 20px; background-color: #10b981; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 14px; box-shadow: 0 2px 4px rgba(16,185,129,0.2); transition: background 0.2s, transform 0.1s; }
        .download-link:hover { background-color: #059669; transform: translateY(-1px); }
        .download-link:active { transform: translateY(1px); }
    </style>
</head>
<body>

<div class="card">
    <h2>Batch Photo Framer</h2>
    <div class="subtitle">Process up to 50 photos with a single frame overlay</div>
    
    <div class="group">
        <label id="photoLabel">1. Select User Photos (Max 50)</label>
        <input type="file" id="photoInput" accept="image/*" multiple onchange="validatePhotoCount()">
    </div>
    
    <div class="group">
        <label>2. Select Frame Graphic (.png template)</label>
        <input type="file" id="frameInput" accept="image/png">
    </div>
    
    <button id="processBtn" onclick="processBatchFramer()">Generate Batch Photos</button>
    
    <!-- Processing Progress Area -->
    <div class="progress-container" id="progressArea">
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="barFill"></div>
        </div>
        <div class="status-text" id="statusLabel">Initializing execution...</div>
    </div>

    <!-- Ready Notification & Interactive Download Action Trigger -->
    <div class="notification-box" id="notificationBox">
        <div class="notification-title">🎉 Processing Complete!</div>
        <div class="notification-message" id="notificationMessage">Your framed photos package is built and ready for download.</div>
        <a href="#" id="downloadBtn" class="download-link">⬇️ Download ZIP Archive</a>
    </div>
</div>

<script>
let currentDownloadUrl = null;

function validatePhotoCount() {
    const input = document.getElementById('photoInput');
    if (input.files.length > 50) {
        alert("System limitation: Please select a maximum of 50 photos at one time.");
        input.value = ""; 
    }
}

async function imagePromiseFactory(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = () => reject(new Error("Failed to parse image file structural properties"));
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

async function processBatchFramer() {
    const photoInput = document.getElementById('photoInput');
    const frameFile = document.getElementById('frameInput').files[0];
    const processBtn = document.getElementById('processBtn');
    const progressArea = document.getElementById('progressArea');
    const barFill = document.getElementById('barFill');
    const statusLabel = document.getElementById('statusLabel');
    const notificationBox = document.getElementById('notificationBox');
    const downloadBtn = document.getElementById('downloadBtn');
    const notificationMessage = document.getElementById('notificationMessage');
    
    const photosList = photoInput.files;
    
    if (photosList.length === 0 || !frameFile) {
        alert("Error: You must provide at least 1 photo and 1 frame file component.");
        return;
    }
    
    // Revoke old object URL if doing a second generation to free up system device RAM
    if (currentDownloadUrl) {
        URL.revokeObjectURL(currentDownloadUrl);
    }
    
    // Reset and show initial processing states
    processBtn.disabled = true;
    notificationBox.style.display = "none";
    progressArea.style.display = "block";
    barFill.style.width = "0%";
    
    try {
        statusLabel.innerText = "Loading target frame graphic layer...";
        const frameImg = await imagePromiseFactory(frameFile);
        
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = frameImg.width;
        canvas.height = frameImg.height;
        
        const zip = new JSZip();
        const totalFiles = photosList.length;
        
        // Loop and frame images sequentially
        for (let i = 0; i < totalFiles; i++) {
            const currentPhotoFile = photosList[i];
            statusLabel.innerText = `Framing image [${i + 1}/${totalFiles}]: ${currentPhotoFile.name}`;
            
            const photoImg = await imagePromiseFactory(currentPhotoFile);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const scale = Math.min(canvas.width / photoImg.width, canvas.height / photoImg.height);
            const photoW = photoImg.width * scale;
            const photoH = photoImg.height * scale;
            const pasteX = (canvas.width - photoW) / 2;
            const pasteY = (canvas.height - photoH) / 2;
            
            ctx.drawImage(photoImg, pasteX, pasteY, photoW, photoH);
            ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
            
            const blobPromise = new Promise(resolve => canvas.toBlob(resolve, "image/jpeg", 0.90));
            const imageBlob = await blobPromise;
            
            const safeName = currentPhotoFile.name.replace(/\.[^/.]+$/, "") + "_framed.jpg";
            zip.file(safeName, imageBlob);
            
            const progressPercent = Math.round(((i + 1) / totalFiles) * 85);
            barFill.style.width = `${progressPercent}%`;
        }
        
        statusLabel.innerText = "Compiling compressed ZIP payload package...";
        const zipBlob = await zip.generateAsync({ type: "blob" }, (metadata) => {
            const compressionOffset = 85 + Math.round(metadata.percent * 0.15);
            barFill.style.width = `${compressionOffset}%`;
        });
        
        // Create the persistent link URL mapping to our newly created local file blob data
        currentDownloadUrl = URL.createObjectURL(zipBlob);
        
        // Prepare download button properties 
        downloadBtn.href = currentDownloadUrl;
        downloadBtn.download = `framed_photos_${totalFiles}_pack.zip`;
        
        // Update text labels and flag notifications visibility
        notificationMessage.innerText = `Successfully processed ${totalFiles} images! Click the link below to download your complete ZIP archive directly to your device storage safely.`;
        progressArea.style.display = "none";
        notificationBox.style.display = "block";
        
    } catch (err) {
        console.error(err);
        alert(`Runtime error during compilation processing steps: ${err.message}`);
        statusLabel.innerText = "System processing failure.";
    } finally {
        processBtn.disabled = false;
    }
}
</script>

</body>
</html>
