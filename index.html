<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automatic Photo Framer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fb;
            color: #333;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
            padding: 15px;
            border: 2px dashed #ccd1d9;
            border-radius: 8px;
            background: #fafbfc;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #4a5568;
        }
        input[type="file"] {
            display: block;
            width: 100%;
        }
        button {
            display: block;
            width: 100%;
            background: #007bff;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #0056b3;
        }
        button:disabled {
            background: #a0aec0;
            cursor: not-allowed;
        }
        #status {
            text-align: center;
            margin-top: 15px;
            font-weight: 600;
        }
        .output-section {
            margin-top: 30px;
        }
        .download-list {
            list-style: none;
            padding: 0;
        }
        .download-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: #edf2f7;
            margin-bottom: 8px;
            border-radius: 6px;
        }
        .download-btn {
            background: #28a745;
            color: white;
            padding: 6px 12px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
        }
        .download-btn:hover {
            background: #218838;
        }
        #downloadAllBtn {
            background: #28a745;
            margin-bottom: 15px;
        }
        #downloadAllBtn:hover {
            background: #218838;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Automatic Photo Framer</h1>

    <!-- Step 1: Upload Frame -->
    <div class="input-group">
        <label for="frameInput">1. Upload Frame (PNG with transparency preferred):</label>
        <input type="file" id="frameInput" accept="image/*">
    </div>

    <!-- Step 2: Upload Photos -->
    <div class="input-group">
        <label for="photosInput">2. Upload Photos (Multiple allowed):</label>
        <input type="file" id="photosInput" accept="image/*" multiple>
    </div>

    <!-- Submit Button -->
    <button id="processBtn">Process Images</button>
    
    <div id="status"></div>

    <!-- Output Download Links -->
    <div class="output-section" id="outputSection" style="display: none;">
        <h3>Generated Photos</h3>
        <button id="downloadAllBtn" style="display: none;">Download All as ZIP</button>
        <ul id="downloadList" class="download-list"></ul>
    </div>
</div>

<!-- Canvas hidden from view, used only for processing -->
<canvas id="canvas" style="display:none;"></canvas>

<!-- Including JSZip library via CDN to allow batch downloading -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
    const frameInput = document.getElementById('frameInput');
    const photosInput = document.getElementById('photosInput');
    const processBtn = document.getElementById('processBtn');
    const statusDiv = document.getElementById('status');
    const outputSection = document.getElementById('outputSection');
    const downloadList = document.getElementById('downloadList');
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let generatedImages = []; // Stores dataURLs and filenames for downloading

    processBtn.addEventListener('click', async () => {
        const frameFile = frameInput.files[0];
        const photoFiles = photosInput.files;

        if (!frameFile) {
            alert('Please upload a frame image first.');
            return;
        }
        if (photoFiles.length === 0) {
            alert('Please upload at least one photo.');
            return;
        }

        // Reset UI state
        statusDiv.style.color = '#333';
        statusDiv.innerText = "Loading frame...";
        downloadList.innerHTML = '';
        outputSection.style.display = 'none';
        downloadAllBtn.style.display = 'none';
        generatedImages = [];
        processBtn.disabled = true;

        try {
            // 1. Load the frame to get base dimensions
            const frameImg = await loadImage(frameFile);
            
            // Set canvas size strictly to match the frame size
            canvas.width = frameImg.width;
            canvas.height = frameImg.height;

            // 2. Process each uploaded photo
            for (let i = 0; i < photoFiles.length; i++) {
                statusDiv.innerText = `Processing photo ${i + 1} of ${photoFiles.length}...`;
                
                const photoFile = photoFiles[i];
                const photoImg = await loadImage(photoFile);

                // Clear canvas for the new photo
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Calculate Aspect Ratio Fit ("Cover" style)
                const canvasRatio = canvas.width / canvas.height;
                const photoRatio = photoImg.width / photoImg.height;
                
                let renderWidth, renderHeight, xOffset, yOffset;

                if (photoRatio > canvasRatio) {
                    // Photo is wider than the frame aspect ratio
                    renderHeight = canvas.height;
                    renderWidth = photoImg.width * (canvas.height / photoImg.height);
                    xOffset = (canvas.width - renderWidth) / 2;
                    yOffset = 0;
                } else {
                    // Photo is taller than the frame aspect ratio
                    renderWidth = canvas.width;
                    renderHeight = photoImg.height * (canvas.width / photoImg.width);
                    xOffset = 0;
                    yOffset = (canvas.height - renderHeight) / 2;
                }

                // Draw 1: The background photo (centered and scaled)
                ctx.drawImage(photoImg, xOffset, yOffset, renderWidth, renderHeight);

                // Draw 2: Overlay the frame directly on top without altering its dimensions
                ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);

                // Export result
                const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
                const newFileName = `framed_${photoFile.name.split('.')[0]}.jpg`;
                
                generatedImages.push({ dataUrl, fileName: newFileName });

                // Append individual download link to the list
                const li = document.createElement('li');
                li.className = 'download-item';
                li.innerHTML = `
                    <span>${newFileName}</span>
                    <a href="${dataUrl}" download="${newFileName}" class="download-btn">Download</a>
                `;
                downloadList.appendChild(li);
            }

            // UI adjustments after finishing
            statusDiv.style.color = '#28a745';
            statusDiv.innerText = "✨ All photos processed successfully!";
            outputSection.style.display = 'block';

            if (generatedImages.length > 1) {
                downloadAllBtn.style.display = 'block';
            }

        } catch (error) {
            console.error(error);
            statusDiv.style.color = '#dc3545';
            statusDiv.innerText = "An error occurred during processing.";
        } finally {
            processBtn.disabled = false;
        }
    });

    // Handle bundling everything into a single ZIP file download
    downloadAllBtn.addEventListener('click', () => {
        const zip = new JSZip();
        
        generatedImages.forEach(img => {
            // Remove the data URL prefix header to isolate base64 data
            const base64Data = img.dataUrl.split(',')[1];
            zip.file(img.fileName, base64Data, { base64: true });
        });

        statusDiv.innerText = "Generating ZIP file...";
        
        zip.generateAsync({ type: 'blob' }).then((content) => {
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = "framed_photos.zip";
            link.click();
            statusDiv.innerText = "✨ All photos processed successfully!";
        });
    });

    // Helper utility to convert file to Image Object via Promises
    function loadImage(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = e.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }
</script>
</body>
</html>
