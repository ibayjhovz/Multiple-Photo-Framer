<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSC Photo Framing System</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Vibrant background mesh to make the glass effect pop */
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            color: #f8fafc;
        }
        .container {
            width: 100%;
            max-width: 700px;
            /* Core Glassmorphism CSS */
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }
        h1 {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 35px;
            background: linear-gradient(135deg, #38bdf8 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .input-group {
            margin-bottom: 25px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            transition: all 0.3s ease;
        }
        .input-group:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        label {
            display: block;
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 12px;
            color: #e2e8f0;
        }
        input[type="file"] {
            display: block;
            width: 100%;
            font-size: 0.9rem;
            color: #94a3b8;
            cursor: pointer;
        }
        /* Custom file input button styling styling */
        input[type="file"]::file-selector-button {
            border: none;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 15px;
            transition: background 0.2s;
        }
        input[type="file"]::file-selector-button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        button {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            transition: all 0.2s ease;
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }
        button:active {
            transform: translateY(1px);
        }
        button:disabled {
            background: #475569;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
            opacity: 0.6;
        }
        #status {
            text-align: center;
            margin-top: 20px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #cbd5e1;
        }
        .output-section {
            margin-top: 35px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 25px;
        }
        h3 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #e2e8f0;
        }
        .download-list {
            list-style: none;
            padding: 0;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 5px;
        }
        /* Glassy style for items */
        .download-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 10px;
            border-radius: 10px;
            font-size: 0.9rem;
        }
        .download-item span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70%;
        }
        .download-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 8px 16px;
            text-decoration: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
            transition: all 0.2s;
        }
        .download-btn:hover {
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.5);
            filter: brightness(1.1);
        }
        #downloadAllBtn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }
        /* Custom scrollbar for download list */
        .download-list::-webkit-scrollbar {
            width: 6px;
        }
        .download-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.02);
            border-radius: 10px;
        }
        .download-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>OSC Photo Framing System</h1>

    <!-- Step 1: Upload Frame -->
    <div class="input-group">
        <label for="frameInput">1. Upload Frame (PNG template):</label>
        <input type="file" id="frameInput" accept="image/*">
    </div>

    <!-- Step 2: Upload Photos -->
    <div class="input-group">
        <label for="photosInput">2. Upload Source Photos (Multiple):</label>
        <input type="file" id="photosInput" accept="image/*" multiple>
    </div>

    <!-- Submit Button -->
    <button id="processBtn">Process Images</button>
    
    <div id="status"></div>

    <!-- Output Download Links -->
    <div class="output-section" id="outputSection" style="display: none;">
        <h3>Generated Files</h3>
        <button id="downloadAllBtn" style="display: none;">Download All as ZIP (.zip)</button>
        <ul id="downloadList" class="download-list"></ul>
    </div>
</div>

<!-- Hidden processing engine components -->
<canvas id="canvas" style="display:none;"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
    const frameInput = document.getElementById('frameInput');
    const photosInput = document.getElementById('photosInput');
    const processBtn = document.getElementById('processBtn');
    const statusDiv = document.getElementById('status');
    const outputSection = document.getElementById('outputSection');
    const downloadList = document.getElementById('downloadList');
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let generatedImages = [];

    processBtn.addEventListener('click', async () => {
        const frameFile = frameInput.files[0];
        const photoFiles = photosInput.files;

        if (!frameFile) {
            alert('Please upload your frame template.');
            return;
        }
        if (photoFiles.length === 0) {
            alert('Please upload at least one background photo.');
            return;
        }

        statusDiv.style.color = '#cbd5e1';
        statusDiv.innerText = "Initializing template asset...";
        downloadList.innerHTML = '';
        outputSection.style.display = 'none';
        downloadAllBtn.style.display = 'none';
        generatedImages = [];
        processBtn.disabled = true;

        try {
            const frameImg = await loadImage(frameFile);
            
            canvas.width = frameImg.width;
            canvas.height = frameImg.height;

            for (let i = 0; i < photoFiles.length; i++) {
                statusDiv.innerText = `Rendering frame layout ${i + 1} of ${photoFiles.length}...`;
                
                const photoFile = photoFiles[i];
                const photoImg = await loadImage(photoFile);

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                const canvasRatio = canvas.width / canvas.height;
                const photoRatio = photoImg.width / photoImg.height;
                
                let renderWidth, renderHeight, xOffset, yOffset;

                if (photoRatio > canvasRatio) {
                    renderHeight = canvas.height;
                    renderWidth = photoImg.width * (canvas.height / photoImg.height);
                    xOffset = (canvas.width - renderWidth) / 2;
                    yOffset = 0;
                } else {
                    renderWidth = canvas.width;
                    renderHeight = photoImg.height * (canvas.width / photoImg.width);
                    xOffset = 0;
                    yOffset = (canvas.height - renderHeight) / 2;
                }

                ctx.drawImage(photoImg, xOffset, yOffset, renderWidth, renderHeight);
                ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);

                const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
                const newFileName = `framed_${photoFile.name.split('.')[0]}.jpg`;
                
                generatedImages.push({ dataUrl, fileName: newFileName });

                const li = document.createElement('li');
                li.className = 'download-item';
                li.innerHTML = `
                    <span>${newFileName}</span>
                    <a href="${dataUrl}" download="${newFileName}" class="download-btn">Download</a>
                `;
                downloadList.appendChild(li);
            }

            statusDiv.style.color = '#10b981';
            statusDiv.innerText = "✨ Framing task completed successfully!";
            outputSection.style.display = 'block';

            if (generatedImages.length > 1) {
                downloadAllBtn.style.display = 'block';
            }

        } catch (error) {
            console.error(error);
            statusDiv.style.color = '#ef4444';
            statusDiv.innerText = "An execution exception occurred during rendering.";
        } finally {
            processBtn.disabled = false;
        }
    });

    downloadAllBtn.addEventListener('click', () => {
        const zip = new JSZip();
        
        generatedImages.forEach(img => {
            const base64Data = img.dataUrl.split(',')[1];
            zip.file(img.fileName, base64Data, { base64: true });
        });

        statusDiv.style.color = '#cbd5e1';
        statusDiv.innerText = "Compiling archive stream...";
        
        zip.generateAsync({ type: 'blob' }).then((content) => {
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = "OSC_framed_package.zip";
            link.click();
            statusDiv.style.color = '#10b981';
            statusDiv.innerText = "✨ Framing task completed successfully!";
        });
    });

    function loadImage(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = e.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }
</script>
</body>
</html>
