<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Photo Framer Studio</title>
    <!-- JSZip handles packaging files right inside the browser framework -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f3f4f6; margin: 0; padding: 40px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; max-width: 450px; }
        h2 { margin: 0 0 8px 0; color: #1f2937; text-align: center; }
        .subtitle { font-size: 14px; color: #6b7280; text-align: center; margin-bottom: 25px; }
        .group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #4b5563; }
        input[type="file"] { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; background: #fafafa; }
        button { width: 100%; padding: 14px; background-color: #2563eb; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #1d4ed8; }
        button:disabled { background-color: #9ca3af; cursor: not-allowed; }
        
        /* Progress Bar UI Layout Components */
        .progress-container { margin-top: 20px; display: none; }
        .progress-bar-bg { width: 100%; background-color: #e5e7eb; height: 12px; border-radius: 6px; overflow: hidden; margin-bottom: 6px; }
        .progress-bar-fill { width: 0%; background-color: #10b981; height: 100%; transition: width 0.1s ease; }
        .status-text { font-size: 14px; text-align: center; color: #4b5563; font-weight: 500; }
    </style>
</head>
<body>

<div class="card">
    <h2>Batch Photo Framer</h2>
    <div class="subtitle">Process up to 50 photos with a single frame overlay</div>
    
    <div class="group">
        <label id="photoLabel">1. Select User Photos (Max 50)</label>
        <!-- 'multiple' flag allows holding down Shift/Ctrl to select arrays of files -->
        <input type="file" id="photoInput" accept="image/*" multiple onchange="validatePhotoCount()">
    </div>
    
    <div class="group">
        <label>2. Select Frame Graphic (.png template)</label>
        <input type="file" id="frameInput" accept="image/png">
    </div>
    
    <button id="processBtn" onclick="processBatchFramer()">Generate Batch & Download ZIP</button>
    
    <div class="progress-container" id="progressArea">
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="barFill"></div>
        </div>
        <div class="status-text" id="statusLabel">Initializing execution...</div>
    </div>
</div>

<script>
// Helper to limit bulk selection inputs to exactly 50 instances max
function validatePhotoCount() {
    const input = document.getElementById('photoInput');
    if (input.files.length > 50) {
        alert("System limitation: Please select a maximum of 50 photos at one time.");
        input.value = ""; // Flush selected array references
    }
}

// Memory wrapper mapping standard file blobs into image objects seamlessly
async function imagePromiseFactory(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = () => reject(new Error("Failed to parse image file structural properties"));
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

async function processBatchFramer() {
    const photoInput = document.getElementById('photoInput');
    const frameFile = document.getElementById('frameInput').files[0];
    const processBtn = document.getElementById('processBtn');
    const progressArea = document.getElementById('progressArea');
    const barFill = document.getElementById('barFill');
    const statusLabel = document.getElementById('statusLabel');
    
    const photosList = photoInput.files;
    
    if (photosList.length === 0 || !frameFile) {
        alert("Error: You must provide at least 1 photo and 1 frame file component.");
        return;
    }
    
    // Toggle processing state UI controls
    processBtn.disabled = true;
    progressArea.style.display = "block";
    barFill.style.width = "0%";
    
    try {
        statusLabel.innerText = "Loading target frame graphic layer...";
        const frameImg = await imagePromiseFactory(frameFile);
        
        // Setup offscreen virtual canvas mapping standard resolution settings 
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = frameImg.width;
        canvas.height = frameImg.height;
        
        const zip = new JSZip();
        const totalFiles = photosList.length;
        
        // Loop and layer each photo
        for (let i = 0; i < totalFiles; i++) {
            const currentPhotoFile = photosList[i];
            statusLabel.innerText = `Processing file [${i + 1}/${totalFiles}]: ${currentPhotoFile.name}`;
            
            // Render photo item data structure 
            const photoImg = await imagePromiseFactory(currentPhotoFile);
            
            // Wipe canvas clear from prior loops 
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Calculate spatial dimensions to maintain proper proportional aspect ratios
            const scale = Math.min(canvas.width / photoImg.width, canvas.height / photoImg.height);
            const photoW = photoImg.width * scale;
            const photoH = photoImg.height * scale;
            const pasteX = (canvas.width - photoW) / 2;
            const pasteY = (canvas.height - photoH) / 2;
            
            // Draw composition layer bindings
            ctx.drawImage(photoImg, pasteX, pasteY, photoW, photoH);
            ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
            
            // Export active matrix rendering into native blob arrays inside the iteration loop
            const blobPromise = new Promise(resolve => canvas.toBlob(resolve, "image/jpeg", 0.90));
            const imageBlob = await blobPromise;
            
            // Package into the zip stream under a normalized, organized naming index
            const safeName = currentPhotoFile.name.replace(/\.[^/.]+$/, "") + "_framed.jpg";
            zip.file(safeName, imageBlob);
            
            // Scale loading indicator widths linearly matching work progress ratios
            const progressPercent = Math.round(((i + 1) / totalFiles) * 85); // Reserving last 15% for compression overhead
            barFill.style.width = `${progressPercent}%`;
        }
        
        statusLabel.innerText = "Compiling and packaging ZIP payload archive structure...";
        const zipBlob = await zip.generateAsync({ type: "blob" }, (metadata) => {
            // Fine tune final bar progression parameters dynamically based on compression status
            const compressionOffset = 85 + Math.round(metadata.percent * 0.15);
            barFill.style.width = `${compressionOffset}%`;
        });
        
        statusLabel.innerText = "Processing completed! Initializing file export sequence...";
        
        // Auto trigger document save routine on client sandbox storage
        const downloadUrl = URL.createObjectURL(zipBlob);
        const anchorNode = document.createElement('a');
        anchorNode.href = downloadUrl;
        anchorNode.download = `batch_framed_photos_${totalFiles}_pack.zip`;
        document.body.appendChild(anchorNode);
        anchorNode.click();
        document.body.removeChild(anchorNode);
        
        statusLabel.innerText = "Export completed successfully.";
        
    } catch (err) {
        console.error(err);
        alert(`Runtime error during compilation processing steps: ${err.message}`);
        statusLabel.innerText = "System processing failure.";
    } finally {
        processBtn.disabled = false;
    }
}
</script>

</body>
</html>
